<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function(){
  try{
    var saved = localStorage.getItem('lts-theme');
    var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Sign In — Little Technical Solutions LLC</title>
<meta name="robots" content="noindex, nofollow">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/png" href="assets/favicon.png">
<style>
  /* Admin-only additions -- not part of the public design system in
     css/style.css, kept here so this stays a single self-contained file. */
  .admin-header{ background: var(--navy-deep); color:#fff; }
  .admin-header-inner{ display:flex; align-items:center; justify-content:space-between; padding: 1.1rem 0; }
  .admin-header a.logo-link{ display:flex; align-items:center; gap:.6rem; color:#fff; font-family:var(--font-display); font-weight:600; }
  .admin-header a.logo-link img{ width:30px; height:30px; }
  .admin-header-actions{ display:flex; align-items:center; gap:1.25rem; font-size:.88rem; }
  .admin-header-actions a{ color: rgba(238,241,245,0.8); }
  .admin-header-actions a:hover{ color:#fff; }
  .admin-main{ max-width: 760px; margin: 0 auto; padding: 3rem 1.25rem 5rem; }
  .admin-tabs{ display:flex; flex-wrap:wrap; gap:.6rem; margin-bottom:2rem; }
  .admin-tabs a{
    font-size:.85rem; font-weight:600; padding:.55rem 1.1rem; border-radius:999px;
    border:1px solid var(--line); color: var(--ink-soft); background: var(--paper-alt);
  }
  .admin-tabs a.is-active{ border-color: var(--accent-orange); color: var(--accent-orange-text); background: var(--paper); }
  .admin-card{ background: var(--paper-alt); border:1px solid var(--line); border-radius: var(--radius); padding: 1.75rem; margin-bottom: 1.5rem; }
  .admin-card h1{ font-size:1.3rem; margin-bottom:.4rem; }
  .admin-card h2{ font-size:1.05rem; margin-bottom:1rem; }
  .admin-item-list{ display:flex; flex-direction:column; gap:.9rem; margin-top:1.5rem; }
  .admin-item{
    display:flex; gap:1rem; align-items:flex-start; border:1px solid var(--line); border-radius: var(--radius);
    padding:1rem; background: var(--paper);
  }
  .admin-item-thumb{ width:64px; height:64px; border-radius:6px; object-fit:cover; flex-shrink:0; background: var(--line); }
  .admin-item-body{ flex:1; min-width:0; }
  .admin-item-body h3{ font-size:.95rem; font-weight:600; margin-bottom:.2rem; }
  .admin-item-body p{ font-size:.82rem; color: var(--ink-soft); }
  .admin-item-actions{ display:flex; gap:.5rem; flex-shrink:0; flex-wrap:wrap; }
  .admin-item-actions button{ font-size:.78rem; padding:.4rem .7rem; margin:0; }
  .admin-empty{ font-size:.88rem; color: var(--ink-faint); padding: 1rem 0; }
  .admin-thumb-preview{ width:120px; border-radius:6px; margin-top:.6rem; display:none; }
  .admin-field-hint{ font-size:.78rem; color: var(--ink-faint); font-weight:400; margin-top:.2rem; }
  .status{ font-size:.85rem; font-weight:600; margin-top:.75rem; min-height:1.2em; }
  .status.ok{ color: var(--accent-teal-text); }
  .status.error{ color: var(--accent-orange-text); }
  .status.pending{ color: var(--ink-soft); font-weight:500; font-style:italic; }
  .status a.linklike{ font-weight:600; font-style:normal; margin-left:.4rem; }
  a.linklike{ color: var(--accent-teal-text); cursor:pointer; text-decoration:underline; font-size:.85rem; }
</style>
</head>
<body>

<header class="admin-header">
  <div class="wrap admin-header-inner">
    <a href="#dashboard" class="logo-link">
      <img src="assets/logo-icon.png" alt="">
      <span>Little Technical Solutions — Staff</span>
    </a>
    <nav class="admin-header-actions" id="adminHeaderActions"></nav>
  </div>
</header>

<main class="admin-main" id="view"></main>

<script>
(function () {
  var API = "/.netlify/functions/";
  var state = { user: null };

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function el(html) {
    var d = document.createElement("div");
    d.innerHTML = html.trim();
    return d.firstChild;
  }

  async function api(path, opts) {
    opts = opts || {};
    try {
      var res = await fetch(API + path, Object.assign({ credentials: "same-origin", headers: { "Content-Type": "application/json" } }, opts));
      var body = null;
      try { body = await res.json(); } catch (e) {}
      return { ok: res.ok, status: res.status, body: body };
    } catch (networkErr) {
      return { ok: false, status: 0, body: { error: "Could not reach the server. Check your connection and try again." } };
    }
  }

  function slugify(s) {
    return String(s || "").toLowerCase().trim()
      .replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 60) || "item";
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  async function loadSession() {
    var r = await api("content"); // any admin-gated GET works to check the session + role
    state.user = r.ok ? { role: "admin" } : null;
    // content GET without a slug requires admin/staff; if that succeeds we
    // know we have a valid signed-in admin session. A plain "who am I"
    // endpoint isn't part of this module's scope, so this doubles as one.
  }

  function renderHeaderActions() {
    var nav = document.getElementById("adminHeaderActions");
    if (state.user) {
      nav.innerHTML = '<a href="index.html">Back to site</a><a href="#" id="signout-link">Sign out</a>';
      document.getElementById("signout-link").addEventListener("click", async function (e) {
        e.preventDefault();
        await api("auth-logout", { method: "POST" });
        state.user = null;
        window.location.hash = "#signin";
      });
    } else {
      nav.innerHTML = '<a href="index.html">Back to site</a>';
    }
  }

  function requireAuth() {
    if (!state.user) { window.location.hash = "#signin"; return false; }
    return true;
  }

  var views = {};

  views.signin = function () {
    document.title = "Staff Sign In — Little Technical Solutions LLC";
    var v = el('<div class="admin-card"><h1>Staff sign in</h1>' +
      '<div class="form-row"><label for="si-email">Email</label><input id="si-email" type="email"></div>' +
      '<div class="form-row"><label for="si-password">Password</label><input id="si-password" type="password"></div>' +
      '<button class="btn btn-primary" id="si-submit">Sign in</button>' +
      '<p class="status" id="si-status"></p>' +
      '<p style="margin-top:1rem;"><a class="linklike" href="#reset-request">Forgot password?</a></p>' +
      '</div>');
    v.querySelector("#si-submit").addEventListener("click", async function () {
      var status = v.querySelector("#si-status");
      var r = await api("auth-login", { method: "POST", body: JSON.stringify({ email: v.querySelector("#si-email").value, password: v.querySelector("#si-password").value }) });
      if (r.ok && r.body && r.body.mfaRequired) {
        // Password was correct, but this is an admin-role account and
        // two-factor authentication is mandatory for those -- auth-login.js
        // deliberately withholds a real session until that's completed. This
        // page has no TOTP enrollment/verification UI of its own (Care Hub's
        // React app already has a full, tested one), so point there rather
        // than falsely claiming success and silently failing to sign in.
        status.innerHTML = r.body.enrollmentRequired
          ? "Your password was correct, but administrator accounts require two-factor authentication. " +
            'Set it up at <a href="/care-hub/login">the Care Hub sign-in page</a> -- once that\'s done, come back here and you\'ll be signed in.'
          : "Your password was correct. Enter your authenticator app code at " +
            '<a href="/care-hub/login">the Care Hub sign-in page</a> to finish signing in, then come back here.';
        status.className = "status error";
      } else if (r.ok) {
        status.textContent = "Signed in.";
        status.className = "status ok";
        await loadSession();
        renderHeaderActions();
        window.location.hash = "#dashboard";
      } else {
        status.textContent = (r.body && r.body.error) || "Sign-in failed.";
        status.className = "status error";
      }
    });
    return v;
  };

  views["reset-request"] = function () {
    document.title = "Reset Password — Little Technical Solutions LLC";
    var v = el('<div class="admin-card"><h1>Reset your password</h1>' +
      '<div class="form-row"><label for="rr-email">Email</label><input id="rr-email" type="email"></div>' +
      '<button class="btn btn-primary" id="rr-submit">Generate reset link</button>' +
      '<p class="status" id="rr-status"></p>' +
      '<p style="font-size:.8rem; color:var(--ink-faint); margin-top:1rem;">Check your email for a reset link. If it doesn\'t arrive, see README_ADMIN_SETUP.md for how to fetch the token by hand.</p>' +
      '</div>');
    v.querySelector("#rr-submit").addEventListener("click", async function () {
      var status = v.querySelector("#rr-status");
      var r = await api("auth-password-reset", { method: "POST", body: JSON.stringify({ action: "request", email: v.querySelector("#rr-email").value, page: "admin" }) });
      status.textContent = (r.body && r.body.message) || "Request sent.";
      status.className = "status ok";
    });
    return v;
  };

  views.reset = function () {
    document.title = "Set New Password — Little Technical Solutions LLC";
    var params = new URLSearchParams(window.location.hash.split("?")[1] || "");
    var token = params.get("token") || "";
    var v = el('<div class="admin-card"><h1>Set a new password</h1>' +
      '<div class="form-row"><label for="rc-password">New password</label><input id="rc-password" type="password"></div>' +
      '<button class="btn btn-primary" id="rc-submit">Update password</button>' +
      '<p class="status" id="rc-status"></p></div>');
    v.querySelector("#rc-submit").addEventListener("click", async function () {
      var status = v.querySelector("#rc-status");
      var r = await api("auth-password-reset", { method: "POST", body: JSON.stringify({ action: "confirm", token: token, newPassword: v.querySelector("#rc-password").value }) });
      status.textContent = (r.body && (r.body.message || r.body.error)) || "Something went wrong.";
      status.className = "status " + (r.ok ? "ok" : "error");
      if (r.ok) window.location.hash = "#signin";
    });
    return v;
  };

  views.dashboard = function () {
    if (!requireAuth()) return el("<div></div>");
    document.title = "Dashboard — Little Technical Solutions LLC Staff";
    return el('<div class="admin-card"><h1>What do you want to update?</h1>' +
      '<p style="font-size:.9rem; color:var(--ink-soft); margin-bottom:1.5rem;">Changes here go live on the site immediately -- no rebuild or redeploy needed.</p>' +
      '<div class="admin-tabs">' +
      '<a href="#posts">Blog Posts</a>' +
      '<a href="#portfolio">Portfolio</a>' +
      '<a href="#testimonials">Testimonials</a>' +
      '<a href="#gallery">Gallery</a>' +
      '<a href="#images">Image Library</a>' +
      '<a href="#customers">Customers</a>' +
      '<a href="#account">Account Settings</a>' +
      '</div></div>');
  };

  // ---- Generic list-editor factory, shared by Posts / Portfolio / Testimonials ----
  var EDITORS = {
    posts: {
      slug: "blog-posts", title: "Blog Posts", hash: "posts",
      fields: [
        { key: "title", label: "Title", type: "text", required: true },
        { key: "slug", label: "URL slug", type: "text", required: true, hint: "Used in the link, e.g. “hello-world” → blog-post.html?slug=hello-world", auto: function (item) { return slugify(item.title); } },
        { key: "category", label: "Category", type: "text", hint: "e.g. Website, Cybersecurity, Networking" },
        { key: "date", label: "Date", type: "date" },
        { key: "excerpt", label: "Short excerpt", type: "textarea", rows: 2, hint: "Shown on the blog list page" },
        { key: "body", label: "Full article", type: "textarea", rows: 10, hint: "Leave a blank line between paragraphs" },
        { key: "imageDataUri", label: "Featured photo (optional)", type: "image" },
      ],
      itemLabel: function (item) { return item.title || "(untitled post)"; },
      itemSub: function (item) { return [item.category, item.date].filter(Boolean).join(" · "); },
    },
    portfolio: {
      slug: "portfolio-items", title: "Portfolio", hash: "portfolio",
      fields: [
        { key: "title", label: "Project title", type: "text", required: true },
        { key: "description", label: "Description", type: "textarea", rows: 4, required: true },
        { key: "imageDataUri", label: "Photo (optional)", type: "image" },
      ],
      itemLabel: function (item) { return item.title || "(untitled project)"; },
      itemSub: function (item) { return (item.description || "").slice(0, 80); },
    },
    testimonials: {
      slug: "testimonials", title: "Testimonials", hash: "testimonials",
      fields: [
        { key: "quote", label: "Quote", type: "textarea", rows: 3, required: true },
        { key: "author", label: "Author name", type: "text", required: true },
        { key: "roleOrCompany", label: "Role / company (optional)", type: "text" },
      ],
      itemLabel: function (item) { return item.author || "(unnamed)"; },
      itemSub: function (item) { return '“' + (item.quote || "").slice(0, 80) + '”'; },
    },
    gallery: {
      slug: "gallery-images", title: "Gallery", hash: "gallery",
      fields: [
        { key: "imageDataUri", label: "Photo", type: "image", required: true },
        { key: "altText", label: "Alt text", type: "text", required: true, hint: "Describes the photo for screen readers -- required for every gallery image" },
        { key: "caption", label: "Caption (optional)", type: "text" },
      ],
      itemLabel: function (item) { return item.altText || "(untitled photo)"; },
      itemSub: function (item) { return item.caption || ""; },
    },
  };

  function makeListEditorView(cfg) {
    return function () {
      if (!requireAuth()) return el("<div></div>");
      document.title = cfg.title + " — Little Technical Solutions LLC Staff";

      var items = [];
      var editingId = null;

      var v = el('<div>' +
        '<div class="admin-tabs" id="tabs"></div>' +
        '<div class="admin-card"><h1>' + esc(cfg.title) + '</h1>' +
        '<h2 id="formTitle">Add new</h2>' +
        '<form id="itemForm"></form>' +
        '<p class="status" id="formStatus"></p>' +
        '</div>' +
        '<div class="admin-card"><h2>Current items</h2>' +
        '<p style="font-size:.85rem; color:var(--ink-soft);">Drag order isn\'t supported yet -- use the up/down buttons to reorder. Every change below (adding, editing, deleting, or reordering) saves and goes live on the site immediately.</p>' +
        '<div class="admin-item-list" id="itemList"></div>' +
        '<p class="status" id="listStatus"></p>' +
        '</div></div>');

      // tabs
      var tabsEl = v.querySelector("#tabs");
      Object.keys(EDITORS).forEach(function (key) {
        var c = EDITORS[key];
        var a = el('<a href="#' + c.hash + '">' + esc(c.title) + '</a>');
        if (c.slug === cfg.slug) a.classList.add("is-active");
        tabsEl.appendChild(a);
      });
      tabsEl.appendChild(el('<a href="#images">Image Library</a>'));
      tabsEl.appendChild(el('<a href="#customers">Customers</a>'));
      tabsEl.appendChild(el('<a href="#account">Account Settings</a>'));
      tabsEl.appendChild(el('<a href="#dashboard">Dashboard</a>'));

      // Every add/edit/delete/reorder auto-saves the full list right away --
      // there is no separate "publish" step. `savePromise` chains successive
      // saves so they hit the server in the order they happened (each one
      // reads `items` fresh when it actually fires, so the last save in the
      // chain always reflects the truest, most current state).
      var savePromise = Promise.resolve();

      function setStatus(statusEl, kind, text) {
        statusEl.textContent = text;
        statusEl.className = "status" + (kind ? " " + kind : "");
      }

      // Shows an error message with an optional inline "Retry" link that
      // re-attempts the same save.
      function setError(statusEl, message, retryFn) {
        statusEl.textContent = "";
        statusEl.className = "status error";
        statusEl.appendChild(document.createTextNode(message));
        if (retryFn) {
          var retry = document.createElement("a");
          retry.href = "#";
          retry.className = "linklike";
          retry.textContent = "Retry";
          retry.addEventListener("click", function (e) {
            e.preventDefault();
            retryFn();
          });
          statusEl.appendChild(document.createTextNode(" "));
          statusEl.appendChild(retry);
        }
      }

      // Persists the current `items` array to the server. `rollback`, if
      // given, is called (and the list re-rendered) when the save fails --
      // used for delete/reorder, where there's no unsaved user input at risk
      // and the honest thing is to put the item/order back since the change
      // never actually went live. Add/edit pass no rollback: the admin's
      // freshly-typed content stays visible in the list (so it isn't lost)
      // along with a Retry option.
      function persistItems(statusEl, savedMessage, rollback) {
        savePromise = savePromise.then(function () {
          setStatus(statusEl, "pending", "Saving…");
          return api("content", { method: "POST", body: JSON.stringify({ slug: cfg.slug, data: items }) });
        }).then(function (r) {
          if (r.ok) {
            setStatus(statusEl, "ok", savedMessage);
          } else {
            var msg = (r.body && r.body.error) || "Could not save -- this change hasn't gone live. Check your connection and try again.";
            if (rollback) {
              rollback();
              renderList();
              setError(statusEl, msg, null);
            } else {
              setError(statusEl, msg, function () { persistItems(statusEl, savedMessage, rollback); });
            }
          }
        });
        return savePromise;
      }

      function buildForm(existing) {
        var form = v.querySelector("#itemForm");
        form.innerHTML = "";
        var draft = Object.assign({}, existing);
        cfg.fields.forEach(function (f) {
          var row = document.createElement("div");
          row.className = "form-row";
          var label = document.createElement("label");
          label.setAttribute("for", "f-" + f.key);
          label.innerHTML = esc(f.label) + (f.hint ? ' <span class="admin-field-hint">' + esc(f.hint) + "</span>" : "");
          row.appendChild(label);

          if (f.type === "textarea") {
            var ta = document.createElement("textarea");
            ta.id = "f-" + f.key;
            ta.rows = f.rows || 4;
            ta.value = draft[f.key] || "";
            row.appendChild(ta);
          } else if (f.type === "image") {
            var fileInput = document.createElement("input");
            fileInput.type = "file";
            fileInput.accept = "image/*";
            fileInput.id = "f-" + f.key;
            var preview = document.createElement("img");
            preview.className = "admin-thumb-preview";
            if (draft[f.key]) { preview.src = draft[f.key]; preview.style.display = "block"; }
            fileInput.addEventListener("change", function () {
              var file = fileInput.files[0];
              if (!file) return;
              if (file.size > 3.5 * 1024 * 1024) { alert("Please use an image under about 3.5MB."); fileInput.value = ""; return; }
              var reader = new FileReader();
              reader.onload = function () {
                draft[f.key] = reader.result;
                preview.src = reader.result;
                preview.style.display = "block";
              };
              reader.readAsDataURL(file);
            });
            row.appendChild(fileInput);
            row.appendChild(preview);
            if (draft[f.key]) {
              var removeBtn = document.createElement("button");
              removeBtn.type = "button";
              removeBtn.className = "btn btn-ghost btn-small";
              removeBtn.style.marginTop = ".5rem";
              removeBtn.textContent = "Remove photo";
              removeBtn.addEventListener("click", function () { draft[f.key] = ""; preview.style.display = "none"; fileInput.value = ""; });
              row.appendChild(removeBtn);
            }
          } else if (f.type === "date") {
            var dateInput = document.createElement("input");
            dateInput.type = "date";
            dateInput.id = "f-" + f.key;
            dateInput.value = draft[f.key] || new Date().toISOString().slice(0, 10);
            row.appendChild(dateInput);
          } else {
            var input = document.createElement("input");
            input.type = "text";
            input.id = "f-" + f.key;
            input.value = draft[f.key] || "";
            row.appendChild(input);
          }
          form.appendChild(row);
        });

        var actions = document.createElement("div");
        var saveBtn = document.createElement("button");
        saveBtn.type = "button";
        saveBtn.className = "btn btn-primary";
        saveBtn.textContent = editingId ? "Update item" : "Add item";
        actions.appendChild(saveBtn);
        if (editingId) {
          var cancelBtn = document.createElement("button");
          cancelBtn.type = "button";
          cancelBtn.className = "btn btn-ghost";
          cancelBtn.style.marginLeft = ".6rem";
          cancelBtn.textContent = "Cancel edit";
          cancelBtn.addEventListener("click", function () { editingId = null; v.querySelector("#formTitle").textContent = "Add new"; buildForm({}); });
          actions.appendChild(cancelBtn);
        }
        form.appendChild(actions);

        saveBtn.addEventListener("click", function () {
          var statusEl = v.querySelector("#formStatus");
          var out = {};
          var missing = [];
          cfg.fields.forEach(function (f) {
            if (f.type === "image") {
              out[f.key] = draft[f.key] || "";
            } else {
              var el2 = document.getElementById("f-" + f.key);
              out[f.key] = el2 ? el2.value.trim() : "";
            }
            if (f.required && !out[f.key]) missing.push(f.label);
          });
          if (missing.length) {
            statusEl.textContent = "Please fill in: " + missing.join(", ");
            statusEl.className = "status error";
            return;
          }
          cfg.fields.forEach(function (f) {
            if (f.auto && !out[f.key]) out[f.key] = f.auto(out);
          });

          var wasEditing = !!editingId;
          if (editingId) {
            var idx = items.findIndex(function (i) { return i.id === editingId; });
            if (idx !== -1) items[idx] = Object.assign({ id: editingId }, out);
            editingId = null;
          } else {
            items.push(Object.assign({ id: uid() }, out));
          }
          v.querySelector("#formTitle").textContent = "Add new";
          buildForm({});
          renderList();
          // No rollback here on purpose: if the save fails, the admin's
          // freshly-entered item stays visible in the list (nothing typed is
          // lost) with a Retry option, rather than reverting the form.
          persistItems(statusEl, (wasEditing ? "Updated" : "Added") + " ✓ -- live on the site now.", null);
        });
      }

      function renderList() {
        var listEl = v.querySelector("#itemList");
        listEl.innerHTML = "";
        if (!items.length) {
          listEl.appendChild(el('<p class="admin-empty">Nothing here yet.</p>'));
          return;
        }
        items.forEach(function (item, idx) {
          var thumb = item.imageDataUri
            ? '<img class="admin-item-thumb" src="' + item.imageDataUri + '" alt="">'
            : '<div class="admin-item-thumb"></div>';
          var row = el('<div class="admin-item">' + thumb +
            '<div class="admin-item-body"><h3>' + esc(cfg.itemLabel(item)) + '</h3><p>' + esc(cfg.itemSub(item)) + '</p></div>' +
            '<div class="admin-item-actions">' +
            '<button type="button" class="btn btn-ghost" data-act="up"' + (idx === 0 ? " disabled" : "") + '>↑</button>' +
            '<button type="button" class="btn btn-ghost" data-act="down"' + (idx === items.length - 1 ? " disabled" : "") + '>↓</button>' +
            '<button type="button" class="btn btn-ghost" data-act="edit">Edit</button>' +

          });
          row.querySelector('[data-act="delete"]').addEventListener("click", function () {
            if (!confirm("Delete “" + cfg.itemLabel(item) + "”? This removes it from the live site right away.")) return;
            var prevItems = items.slice();
            items = items.filter(function (i) { return i.id !== item.id; });
            renderList();
            persistItems(v.querySelector("#listStatus"), "Deleted ✓ -- removed from the site.", function () {
              items = prevItems;
            });
          });
          row.querySelector('[data-act="up"]').addEventListener("click", function () {
            if (idx === 0) return;
            var prevItems = items.slice();
            var tmp = items[idx - 1]; items[idx - 1] = items[idx]; items[idx] = tmp;
            renderList();
            persistItems(v.querySelector("#listStatus"), "Order saved ✓ -- live on the site now.", function () {
              items = prevItems;
            });
          });
          row.querySelector('[data-act="down"]').addEventListener("click", function () {
            if (idx === items.length - 1) return;
            var prevItems = items.slice();
            var tmp = items[idx + 1]; items[idx + 1] = items[idx]; items[idx] = tmp;
            renderList();
            persistItems(v.querySelector("#listStatus"), "Order saved ✓ -- live on the site now.", function () {
              items = prevItems;
            });
          });
          listEl.appendChild(row);
        });
      }

      buildForm({});
      renderList();
      api("content?slug=" + encodeURIComponent(cfg.slug)).then(function (r) {
        items = (r.ok && r.body && r.body.data) || [];
        renderList();
      });

      return v;
    };

  function route() {
    var hash = (window.location.hash || "#signin").split("?")[0].replace("#", "");
    var view = views[hash];
    var container = document.getElementById("view");
    container.innerHTML = "";
    if (!view) { container.appendChild(el('<div class="admin-card"><p>Unknown page.</p></div>')); return; }
    container.appendChild(view());
  }

  window.addEventListener("hashchange", route);
  loadSession().then(function () { renderHeaderActions(); route(); }).catch(function () { renderHeaderActions(); route(); });
})();
</script>
</body>
</html>
