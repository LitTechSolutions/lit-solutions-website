<!doctype html>
<html lang="en">
  <head>
    <script>
      // Same theme-init pattern as the public site's index.html (see
      // css/style.css's :root[data-theme="dark"] block) -- set before
      // first paint so there's no light-mode flash for a user who chose
      // dark, and so the Care Hub visually matches whichever theme the
      // marketing site last showed them (shared localStorage key, same
      // origin).
      (function () {
        try {
          var saved = localStorage.getItem("lts-theme");
          var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Care Hub — Little Technical Solutions LLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
