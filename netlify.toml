[build]
  publish = "."
  # Only the Care Hub (care-hub-app/) has a real build step -- the 33
  # public pages stay static/build-less exactly as before, untouched by
  # this command. Output goes to ../care-hub (repo root, see
  # care-hub-app/vite.config.ts), which becomes part of the published
  # directory tree alongside every existing static page. care-hub-app/
  # itself (source + node_modules) is excluded from the deploy upload by
  # .netlifyignore, so it's never served.
  command = "npm --prefix care-hub-app install && npm --prefix care-hub-app run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/subscriptions.html"
  to = "/payment.html#subscriptions"
  status = 301

# Care Hub is a client-side-routed single-page app (React Router) --
# any path under /care-hub/ that isn't a real built file (JS/CSS/images)
# must fall through to its index.html so the router can take over.
# Must come before the catch-all /* -> 404 rule below, since redirects
# are evaluated in order and the first match wins.
[[redirects]]
  from = "/care-hub/*"
  to = "/care-hub/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://www.google.com; connect-src 'self'; form-action 'self'; base-uri 'self'; object-src 'none'"
