[build]
  publish = "."
  # Only the Care Hub (care-hub-app/) has a real build step -- the 33
  # public pages stay static/build-less exactly as before, untouched by
  # this command. Output goes to ../care-hub (repo root, see
  # care-hub-app/vite.config.ts), which becomes part of the published
  # directory tree alongside every existing static page. care-hub-app/
  # itself (source + node_modules) is excluded from the deploy upload by
  # .netlifyignore, so it's never served.
  command = "npm --prefix care-hub-app install && npm --prefix care-hub-app run build"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# littletechicalsolutions.com was added as a domain alias for brand
# protection, but Netlify's automatic "redirect non-primary domains to
# primary" behavior only covers www/apex variants of the SAME registered
# domain -- confirmed live in the Netlify dashboard: www.lit-solutions.tech
# shows "Redirects automatically to primary domain," but
# littletechicalsolutions.com and its www variant show only "Domain alias"
# with no such note, even with lit-solutions.tech set as primary. A
# genuinely different domain added as an alias just mirrors the site's
# content instead of forwarding. These explicit host-matched redirects are
# the fix. Must come before the generic /* catch-all below (redirects are
# evaluated in order, first match wins, and that rule has no hostname so it
# would otherwise match these requests first). `force = true` is required
# too -- without it, this domain's own served index.html/etc. would win
# over the redirect by Netlify's normal file-vs-redirect precedence.
[[redirects]]
  from = "https://littletechicalsolutions.com/*"
  to = "https://lit-solutions.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.littletechicalsolutions.com/*"
  to = "https://lit-solutions.tech/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/subscriptions.html"
  to = "/payment.html#subscriptions"
  status = 301

# Care Hub is a client-side-routed single-page app (React Router) --
# any path under /care-hub/ that isn't a real built file (JS/CSS/images)
# must fall through to its index.html so the router can take over.
# Must come before the catch-all /* -> 404 rule below, since redirects
# are evaluated in order and the first match wins.
[[redirects]]
  from = "/care-hub/*"
  to = "/care-hub/index.html"
  status = 200

# This catch-all has no method restriction, so it also matches POST
# requests -- including a POST to "/" itself, which is how native Netlify
# Forms' AJAX pattern (fetch('/', {method:'POST', ...})) submits. That
# combination broke all 4 of the site's forms (contact/booking/newsletter/
# intake): every submission 404'd here instead of being captured by
# Netlify Forms. Fixed by moving those forms onto a real Netlify Function
# (netlify/functions/site-forms.js) instead -- /.netlify/functions/* is a
# reserved path Netlify always routes to the function first, regardless of
# this rule, matching how website-designer.js already worked. Do not
# reintroduce data-netlify="true" forms without re-solving this.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; frame-src https://www.google.com; connect-src 'self'; form-action 'self'; base-uri 'self'; object-src 'none'"
